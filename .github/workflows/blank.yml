name: Deploy Frontend React

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build React Project
        run: |
          # Vite usa .env.production para npm run build.
          # Se usa /api porque Nginx ya redirige /api hacia el backend en localhost:8082.
          rm -f .env .env.local
          printf 'VITE_API_URL=/api\n' > .env.production
          npm run build

      - name: Compress Dist Folder
        run: tar -czf front.tar.gz -C dist .

      - name: Create Remote Temp Folder and Upload via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME_RUTA_GO }}
          key: ${{ secrets.PASSWORD_SSH }}
          port: 22
          source: "front.tar.gz"
          target: "/home/${{ secrets.USER_NAME_RUTA_GO }}/front_tmp/"

      - name: Deploy to Web Directory via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME_RUTA_GO }}
          key: ${{ secrets.PASSWORD_SSH }}
          port: 22
          script: |
            set -e

            cd ~/front_tmp
            rm -rf deploy
            mkdir -p deploy
            tar -xzf front.tar.gz -C deploy
            rm -f front.tar.gz

            mkdir -p /var/www/seminario1/rutago/

            # Reemplazar toda la build publicada para evitar assets viejos con localhost hardcodeado.
            rm -rf /var/www/seminario1/rutago/*
            cp -a deploy/. /var/www/seminario1/rutago/

            if grep -R "localhost:8082" /var/www/seminario1/rutago/assets/*.js; then
              echo "ERROR: la build publicada aun contiene localhost:8082"
              exit 1
            fi

            cd ~
            rm -rf ~/front_tmp
